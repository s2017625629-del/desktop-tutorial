<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Star Dodge" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <title>Star Dodge Mobile</title>
    <style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  background: #020617;
  color: #f8fafc;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  touch-action: none;
  user-select: none;
}

button {
  font: inherit;
}

.app-shell {
  min-height: 100svh;
  width: 100%;
  padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.top-card,
.control-card,
.canvas-card {
  border: 1px solid rgba(125, 211, 252, 0.18);
  background: rgba(15, 23, 42, 0.9);
  border-radius: 22px;
  box-shadow: 0 24px 70px rgba(14, 165, 233, 0.13);
}

.top-card {
  padding: 14px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.eyebrow {
  margin: 0 0 4px;
  color: #7dd3fc;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  font-size: clamp(26px, 7vw, 42px);
  line-height: 1;
  color: #e0f2fe;
}

.subtitle {
  margin-top: 8px;
  color: #cbd5e1;
  font-size: 13px;
  line-height: 1.55;
}

.score-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}

.score-box {
  min-width: 0;
  border-radius: 14px;
  padding: 9px 7px;
  background: rgba(30, 41, 59, 0.9);
  text-align: center;
}

.score-box span {
  display: block;
  color: #94a3b8;
  font-size: 11px;
}

.score-box strong {
  display: block;
  margin-top: 2px;
  color: #fde68a;
  font-size: 17px;
}

.game-layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.canvas-card {
  position: relative;
  overflow: hidden;
  min-height: 0;
}

#gameCanvas {
  display: block;
  width: 100%;
  height: auto;
  max-height: 58svh;
  aspect-ratio: 760 / 480;
  object-fit: contain;
  touch-action: none;
  background: #020617;
}

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(2, 6, 23, 0.56);
  backdrop-filter: blur(8px);
}

.overlay.hidden {
  display: none;
}

.overlay-panel {
  width: min(92%, 360px);
  padding: 22px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(15, 23, 42, 0.94);
  text-align: center;
  box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
}

.overlay-panel h2 {
  font-size: 24px;
  color: #e0f2fe;
}

.overlay-panel p,
.control-card p {
  margin-top: 10px;
  color: #cbd5e1;
  font-size: 14px;
  line-height: 1.65;
}

.control-card {
  padding: 14px;
}

.control-card h2 {
  color: #e0f2fe;
  font-size: 19px;
}

.touch-controls {
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.direction-button {
  min-height: 72px;
  border: 0;
  border-radius: 20px;
  background: #1e293b;
  color: white;
  font-size: 34px;
  font-weight: 900;
  box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.22);
}

.direction-button:active,
.direction-button.active {
  transform: scale(0.98);
  background: #0284c7;
}

.action-row {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.primary-button,
.secondary-button {
  min-height: 48px;
  border: 0;
  border-radius: 15px;
  padding: 12px 14px;
  font-weight: 800;
}

.primary-button {
  background: #38bdf8;
  color: #020617;
}

.secondary-button {
  background: #334155;
  color: #f8fafc;
}

.primary-button:active,
.secondary-button:active {
  transform: scale(0.98);
}

.small-note {
  color: #94a3b8 !important;
  font-size: 12px !important;
}

@media (orientation: landscape) and (max-height: 560px) {
  .app-shell {
    gap: 8px;
    padding: 8px;
  }

  .top-card {
    grid-template-columns: 1.3fr 1fr;
    align-items: center;
    padding: 10px 12px;
  }

  h1 {
    font-size: 25px;
  }

  .subtitle,
  .eyebrow {
    display: none;
  }

  .game-layout {
    grid-template-columns: 1fr 235px;
    gap: 8px;
  }

  #gameCanvas {
    max-height: calc(100svh - 96px);
  }

  .control-card {
    padding: 10px;
  }

  .control-card p,
  .small-note {
    display: none;
  }

  .direction-button {
    min-height: 62px;
  }
}

@media (min-width: 900px) {
  .app-shell {
    max-width: 1120px;
    margin: 0 auto;
  }

  .top-card {
    grid-template-columns: 1.2fr 1fr;
    align-items: end;
    padding: 18px;
  }

  .game-layout {
    grid-template-columns: 1fr 290px;
  }

  #gameCanvas {
    max-height: 68svh;
  }
}
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="top-card">
        <section>
          <p class="eyebrow">Mobile Web Game</p>
          <h1>Star Dodge</h1>
          <p class="subtitle">拖动飞船躲开陨石，收集星星加分。iPhone 建议横屏游玩。</p>
        </section>

        <section class="score-grid" aria-label="game stats">
          <div class="score-box"><span>Score</span><strong id="score">0</strong></div>
          <div class="score-box"><span>Lives</span><strong id="lives">3</strong></div>
          <div class="score-box"><span>Level</span><strong id="level">1</strong></div>
          <div class="score-box"><span>Best</span><strong id="bestScore">0</strong></div>
        </section>
      </header>

      <section class="game-layout">
        <div class="canvas-card">
          <canvas id="gameCanvas" width="760" height="480" aria-label="Star Dodge game canvas"></canvas>

          <div id="overlay" class="overlay">
            <div class="overlay-panel">
              <h2 id="overlayTitle">Tap Start to Play</h2>
              <p id="overlayText">iPhone 端：手指按住画面左右拖动，或长按下方方向键。电脑端：A/D、方向键、空格。</p>
              <button id="startButton" class="primary-button">Start</button>
            </div>
          </div>
        </div>

        <aside class="control-card">
          <h2>Controls</h2>
          <p>手机端可以直接拖动画面控制飞船，也可以长按下面的方向键。建议 iPhone 横屏。</p>

          <div class="touch-controls" aria-label="touch controls">
            <button id="leftButton" class="direction-button" aria-label="move left">←</button>
            <button id="rightButton" class="direction-button" aria-label="move right">→</button>
          </div>

          <div class="action-row">
            <button id="restartButton" class="primary-button">Restart</button>
            <button id="pauseButton" class="secondary-button">Pause</button>
          </div>

          <p class="small-note">提示：上传到网站后，用 iPhone Safari 打开网址即可玩。添加到主屏幕后体验更像 App。</p>
        </aside>
      </section>
    </main>

    <script>
const GAME_WIDTH = 760;
const GAME_HEIGHT = 480;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const levelEl = document.getElementById("level");
const bestScoreEl = document.getElementById("bestScore");
const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlayTitle");
const overlayText = document.getElementById("overlayText");
const startButton = document.getElementById("startButton");
const restartButton = document.getElementById("restartButton");
const pauseButton = document.getElementById("pauseButton");
const leftButton = document.getElementById("leftButton");
const rightButton = document.getElementById("rightButton");

const keys = {};
const pointer = { active: false, x: 0 };
const touchButtons = { left: false, right: false };

let gameState = "ready";
let bestScore = Number(localStorage.getItem("starDodgeBestScore") || 0);
let animationFrame = null;

function createInitialGame() {
  return {
    player: {
      x: GAME_WIDTH / 2 - 18,
      y: GAME_HEIGHT - 64,
      w: 36,
      h: 42,
      speed: 6.4,
      invincible: 0,
    },
    meteors: [],
    stars: [],
    particles: [],
    score: 0,
    lives: 3,
    level: 1,
    tick: 0,
    meteorTimer: 0,
    starTimer: 0,
  };
}

let game = createInitialGame();

function setCanvasResolution() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(GAME_WIDTH * dpr);
  canvas.height = Math.floor(GAME_HEIGHT * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function spawnParticles(x, y, count, type) {
  for (let i = 0; i < count; i += 1) {
    game.particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 28 + Math.random() * 18,
      maxLife: 46,
      size: type === "star" ? 3 + Math.random() * 3 : 4 + Math.random() * 5,
      type,
    });
  }
}

function updateUi() {
  scoreEl.textContent = game.score;
  livesEl.textContent = game.lives;
  levelEl.textContent = game.level;
  bestScoreEl.textContent = bestScore;
  pauseButton.textContent = gameState === "paused" ? "Resume" : "Pause";
}

function showOverlay(title, text, buttonText) {
  overlayTitle.textContent = title;
  overlayText.textContent = text;
  startButton.textContent = buttonText;
  overlay.classList.remove("hidden");
}

function hideOverlay() {
  overlay.classList.add("hidden");
}

function startGame() {
  game = createInitialGame();
  gameState = "playing";
  hideOverlay();
  updateUi();
}

function pauseOrResume() {
  if (gameState === "playing") {
    gameState = "paused";
    showOverlay("Paused", "游戏已暂停。点击 Resume 或按空格继续。", "Resume");
  } else if (gameState === "paused") {
    gameState = "playing";
    hideOverlay();
  }
  updateUi();
}

function gameOver() {
  gameState = "gameover";
  bestScore = Math.max(bestScore, game.score);
  localStorage.setItem("starDodgeBestScore", String(bestScore));
  showOverlay("Game Over", `你的分数是 ${game.score}。点击 Restart 再来一次。`, "Restart");
  updateUi();
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
  gradient.addColorStop(0, "#020617");
  gradient.addColorStop(0.55, "#0f172a");
  gradient.addColorStop(1, "#111827");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  ctx.save();
  for (let i = 0; i < 70; i += 1) {
    const x = (i * 113) % GAME_WIDTH;
    const y = (i * 67 + game.tick * (0.35 + (i % 5) * 0.08)) % GAME_HEIGHT;
    const size = 1 + (i % 3) * 0.6;
    ctx.globalAlpha = 0.35 + (i % 4) * 0.12;
    ctx.fillStyle = "#e5e7eb";
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawShip(player) {
  const flash = player.invincible > 0 && Math.floor(game.tick / 5) % 2 === 0;
  if (flash) return;

  const cx = player.x + player.w / 2;
  const top = player.y;
  const bottom = player.y + player.h;
  const gradient = ctx.createLinearGradient(player.x, top, player.x + player.w, bottom);
  gradient.addColorStop(0, "#e0f2fe");
  gradient.addColorStop(0.55, "#38bdf8");
  gradient.addColorStop(1, "#2563eb");

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, top);
  ctx.lineTo(player.x + player.w, bottom - 8);
  ctx.lineTo(cx + 8, bottom - 2);
  ctx.lineTo(cx, bottom - 11);
  ctx.lineTo(cx - 8, bottom - 2);
  ctx.lineTo(player.x, bottom - 8);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.shadowBlur = 16;
  ctx.shadowColor = "#38bdf8";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, player.y + 18, 6, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(cx - 7, bottom - 3);
  ctx.lineTo(cx, bottom + 10 + Math.sin(game.tick / 5) * 2);
  ctx.lineTo(cx + 7, bottom - 3);
  ctx.closePath();
  ctx.fillStyle = "#f97316";
  ctx.fill();
  ctx.restore();
}

function drawMeteor(meteor) {
  ctx.save();
  ctx.translate(meteor.x + meteor.w / 2, meteor.y + meteor.h / 2);
  ctx.rotate(meteor.rotation);

  const radius = meteor.w / 2;
  const gradient = ctx.createRadialGradient(-radius / 3, -radius / 3, 4, 0, 0, radius);
  gradient.addColorStop(0, "#fed7aa");
  gradient.addColorStop(0.55, "#f97316");
  gradient.addColorStop(1, "#7c2d12");

  ctx.beginPath();
  for (let i = 0; i < 9; i += 1) {
    const angle = (Math.PI * 2 * i) / 9;
    const r = radius * (0.72 + meteor.shape[i] * 0.35);
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.shadowBlur = 10;
  ctx.shadowColor = "#fb923c";
  ctx.fill();
  ctx.restore();
}

function drawStar(star) {
  const cx = star.x + star.w / 2;
  const cy = star.y + star.h / 2;
  const points = 5;
  const outer = star.w / 2 + Math.sin(game.tick / 8) * 1.5;
  const inner = outer * 0.45;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(game.tick / 45);
  ctx.beginPath();
  for (let i = 0; i < points * 2; i += 1) {
    const angle = (Math.PI * i) / points - Math.PI / 2;
    const radius = i % 2 === 0 ? outer : inner;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = "#fde047";
  ctx.shadowBlur = 14;
  ctx.shadowColor = "#facc15";
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  game.particles.forEach((particle) => {
    const alpha = clamp(particle.life / particle.maxLife, 0, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = particle.type === "star" ? "#fef08a" : "#fb923c";
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function updateGame() {
  if (gameState !== "playing") return;

  game.tick += 1;
  game.level = Math.floor(game.score / 120) + 1;

  const difficulty = Math.min(1 + game.level * 0.12, 2.4);
  const player = game.player;
  const moveLeft = keys.ArrowLeft || keys.a || keys.A || touchButtons.left;
  const moveRight = keys.ArrowRight || keys.d || keys.D || touchButtons.right;

  if (moveLeft) player.x -= player.speed;
  if (moveRight) player.x += player.speed;

  if (pointer.active) {
    player.x += (pointer.x - player.w / 2 - player.x) * 0.2;
  }

  player.x = clamp(player.x, 8, GAME_WIDTH - player.w - 8);
  if (player.invincible > 0) player.invincible -= 1;

  game.meteorTimer -= 1;
  if (game.meteorTimer <= 0) {
    const size = 28 + Math.random() * 32;
    game.meteors.push({
      x: 12 + Math.random() * (GAME_WIDTH - size - 24),
      y: -size - 10,
      w: size,
      h: size,
      vy: (2.4 + Math.random() * 2.5) * difficulty,
      vx: (Math.random() - 0.5) * 1.1,
      rotation: Math.random() * Math.PI,
      spin: (Math.random() - 0.5) * 0.08,
      shape: Array.from({ length: 9 }, () => Math.random()),
    });
    game.meteorTimer = Math.max(14, 42 - game.level * 2 - Math.random() * 8);
  }

  game.starTimer -= 1;
  if (game.starTimer <= 0) {
    const size = 22;
    game.stars.push({
      x: 20 + Math.random() * (GAME_WIDTH - size - 40),
      y: -size - 8,
      w: size,
      h: size,
      vy: 2.1 + Math.random() * 1.4,
    });
    game.starTimer = 95 + Math.random() * 60;
  }

  game.meteors.forEach((meteor) => {
    meteor.y += meteor.vy;
    meteor.x += meteor.vx;
    meteor.rotation += meteor.spin;
  });

  game.stars.forEach((star) => {
    star.y += star.vy;
  });

  game.particles.forEach((particle) => {
    particle.x += particle.vx;
    particle.y += particle.vy;
    particle.vy += 0.03;
    particle.life -= 1;
  });

  game.meteors = game.meteors.filter((meteor) => meteor.y < GAME_HEIGHT + 80);
  game.stars = game.stars.filter((star) => star.y < GAME_HEIGHT + 60);
  game.particles = game.particles.filter((particle) => particle.life > 0);

  for (let i = game.stars.length - 1; i >= 0; i -= 1) {
    const star = game.stars[i];
    if (rectsOverlap(player, star)) {
      game.score += 25;
      spawnParticles(star.x + star.w / 2, star.y + star.h / 2, 14, "star");
      game.stars.splice(i, 1);
    }
  }

  for (let i = game.meteors.length - 1; i >= 0; i -= 1) {
    const meteor = game.meteors[i];
    if (player.invincible <= 0 && rectsOverlap(player, meteor)) {
      game.lives -= 1;
      player.invincible = 90;
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, 20, "meteor");
      game.meteors.splice(i, 1);

      if (game.lives <= 0) {
        gameOver();
        return;
      }
    }
  }

  game.score += 1;
  updateUi();
}

function drawGame() {
  ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
  drawBackground();
  game.stars.forEach(drawStar);
  game.meteors.forEach(drawMeteor);
  drawParticles();
  drawShip(game.player);
}

function gameLoop() {
  updateGame();
  drawGame();
  animationFrame = requestAnimationFrame(gameLoop);
}

function getCanvasX(event) {
  const rect = canvas.getBoundingClientRect();
  const clientX = event.touches ? event.touches[0].clientX : event.clientX;
  return ((clientX - rect.left) / rect.width) * GAME_WIDTH;
}

function startPointer(event) {
  event.preventDefault();
  if (gameState === "ready" || gameState === "gameover") startGame();
  pointer.active = true;
  pointer.x = getCanvasX(event);
}

function movePointer(event) {
  event.preventDefault();
  if (!pointer.active) return;
  pointer.x = getCanvasX(event);
}

function endPointer() {
  pointer.active = false;
}

function bindHoldButton(button, direction) {
  const activate = (event) => {
    event.preventDefault();
    touchButtons[direction] = true;
    button.classList.add("active");
    if (gameState === "ready" || gameState === "gameover") startGame();
  };

  const deactivate = (event) => {
    if (event) event.preventDefault();
    touchButtons[direction] = false;
    button.classList.remove("active");
  };

  button.addEventListener("touchstart", activate, { passive: false });
  button.addEventListener("touchend", deactivate, { passive: false });
  button.addEventListener("touchcancel", deactivate, { passive: false });
  button.addEventListener("mousedown", activate);
  window.addEventListener("mouseup", deactivate);
  button.addEventListener("mouseleave", deactivate);
}

window.addEventListener("keydown", (event) => {
  keys[event.key] = true;
  if (event.key === " " || event.key === "Spacebar") {
    event.preventDefault();
    pauseOrResume();
  }
  if (event.key === "Enter" && (gameState === "ready" || gameState === "gameover")) {
    startGame();
  }
});

window.addEventListener("keyup", (event) => {
  keys[event.key] = false;
});

canvas.addEventListener("touchstart", startPointer, { passive: false });
canvas.addEventListener("touchmove", movePointer, { passive: false });
canvas.addEventListener("touchend", endPointer, { passive: false });
canvas.addEventListener("mousedown", startPointer);
canvas.addEventListener("mousemove", movePointer);
canvas.addEventListener("mouseup", endPointer);
canvas.addEventListener("mouseleave", endPointer);

startButton.addEventListener("click", () => {
  if (gameState === "paused") pauseOrResume();
  else startGame();
});

restartButton.addEventListener("click", startGame);
pauseButton.addEventListener("click", pauseOrResume);
bindHoldButton(leftButton, "left");
bindHoldButton(rightButton, "right");

window.addEventListener("resize", setCanvasResolution);
window.addEventListener("orientationchange", setCanvasResolution);

document.addEventListener("gesturestart", (event) => event.preventDefault());

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

setCanvasResolution();
